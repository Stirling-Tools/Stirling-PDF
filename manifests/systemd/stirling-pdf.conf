# /etc/stirling-pdf/stirling-pdf.conf
# Environment file loaded by the stirling-pdf systemd service.
# Lines starting with # are comments.
# After editing, reload with:
#   sudo systemctl daemon-reload
#   sudo systemctl restart stirling-pdf

# ---------------------------------------------------------------------------
# JVM tuning
# ---------------------------------------------------------------------------
# Adjust heap sizes to match your available RAM.
JAVA_OPTS=-Xms128m -Xmx512m

# ---------------------------------------------------------------------------
# Server port (default: 8080)
# ---------------------------------------------------------------------------
# SERVER_PORT=8080

# ---------------------------------------------------------------------------
# Spring Boot application properties passed as environment variables.
# Any application.yml key can be overridden here using the
# SPRING_* / STIRLING_PDF_* naming convention.
# ---------------------------------------------------------------------------

# Override the UI base path (e.g. if behind a reverse proxy at /pdf)
# SERVER_SERVLET_CONTEXT_PATH=/

# Disable login (single-user mode)
# SECURITY_ENABLE_LOGIN=false

# Custom application name shown in the UI
# APP_NAME=Stirling-PDF

# Allow unauthenticated users to view the UI
# SYSTEM_DEFAULT_LOCALE=en-GB
