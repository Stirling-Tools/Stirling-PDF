# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "gradle" # See documentation for possible values
    directories:
      - "/" # Location of package manifests
      - "/app/common"
      - "/app/core"
      - "/app/proprietary"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    rebase-strategy: "auto"

  - package-ecosystem: "docker"
    directories:
      - "/" # Location of Dockerfile
      - "/docker/backend"
      - "/docker/embedded"
      - "/docker/frontend"
      - "/docker/base"
      - "/docker/engine"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    rebase-strategy: "auto"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    rebase-strategy: "auto"

  - package-ecosystem: npm
    directories:
      - /devTools
      - /frontend
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    rebase-strategy: "auto"
    groups:
      embedpdf:
        patterns:
          - "@embedpdf/*"
      mantine:
        patterns:
          - "@mantine/*"
          - "postcss-preset-mantine"
      mui:
        patterns:
          - "@mui/*"
      tauri-js:
        patterns:
          - "@tauri-apps/*"
      emotion:
        patterns:
          - "@emotion/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
      vite:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      i18next:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
      iconify:
        patterns:
          - "@iconify/*"
          - "@iconify-json/*"
      stripe:
        patterns:
          - "@stripe/*"
      posthog:
        patterns:
          - "@posthog/*"
          - "posthog-js"
      supabase:
        patterns:
          - "@supabase/*"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      postcss:
        patterns:
          - "postcss"
          - "postcss-*"
        exclude-patterns:
          - "postcss-preset-mantine"

  - package-ecosystem: cargo
    directories:
      - /frontend/src-tauri
      - /frontend/src-tauri/thumbnail-handler
      - /frontend/src-tauri/provisioner
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    rebase-strategy: "auto"
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-build"
          - "tauri-plugin-*"
      serde:
        patterns:
          - "serde"
          - "serde_*"
      tracing:
        patterns:
          - "tracing"
          - "tracing-*"
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"

  - package-ecosystem: pip
    directory: /testing/cucumber
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    rebase-strategy: "auto"
