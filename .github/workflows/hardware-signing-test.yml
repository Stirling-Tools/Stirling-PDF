name: Hardware signing (PKCS#11 / SoftHSM2)

# Real end-to-end validation of the hardware-backed PDF signing path using
# SoftHSM2 (a free software PKCS#11 token). Exercises the exact SunPKCS11 code
# path Stirling uses for USB tokens, so no physical HSM/token is needed.
#
# Runs on PRs that touch the signing code, and on demand. The Windows
# certificate-store path (SunMSCAPI) cannot run on Linux runners; it is covered
# by HardwareSigningIntegrationTest#signsPdfWithWindowsStore on Windows.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/core/src/main/java/stirling/software/SPDF/service/HardwareKeyStoreService.java"
      - "app/core/src/main/java/org/apache/pdfbox/examples/signature/CreateSignatureBase.java"
      - "app/core/src/main/java/stirling/software/SPDF/controller/api/security/CertSignController.java"
      - "app/core/src/main/java/stirling/software/SPDF/controller/api/security/HardwareSigningController.java"
      - "app/core/src/test/java/stirling/software/SPDF/service/HardwareSigningIntegrationTest.java"
      - "app/core/src/test/java/stirling/software/SPDF/service/HardwareKeyStoreServiceTest.java"
      - "scripts/test/setup-softhsm2.sh"
      - ".github/workflows/hardware-signing-test.yml"

permissions:
  contents: read

concurrency:
  group: hardware-signing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkcs11:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Install SoftHSM2
        run: sudo apt-get update -qq && sudo apt-get install -y softhsm2

      - name: Run PKCS#11 signing test against SoftHSM2
        env:
          DISABLE_ADDITIONAL_FEATURES: "true"
        run: bash scripts/test/setup-softhsm2.sh --run
