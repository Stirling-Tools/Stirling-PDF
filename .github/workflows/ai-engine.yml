name: AI Engine CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884 # v5.0.1
        with:
          gradle-version: 9.3.1

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: Regenerate tool models
        run: task engine:tool-models

      - name: Verify tool models are up to date
        run: |
          if ! git diff --exit-code engine/src/stirling/models/tool_models.py; then
            echo "tool_models.py is out of date."
            echo "Run 'task engine:tool-models' locally and commit the updated file."
            exit 1
          fi

      - name: Run fixers
        # Ignore errors here because we're going to add comments for them in the following steps before actually failing
        run: task engine:fix || true

      - name: Check for fixer changes
        id: fixer_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post fixer suggestions
        if: steps.fixer_changes.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: reviewdog/action-suggester@v1
        continue-on-error: true
        with:
          tool_name: engine-make-fix
          github_token: ${{ secrets.GITHUB_TOKEN }}
          filter_mode: file
          fail_level: any
          level: info

      - name: Comment on fixer suggestions
        if: steps.fixer_changes.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "The Python code in your PR has formatting/linting issues. Consider running `task engine:fix` locally or setting up your editor's Ruff integration to auto-format and lint your files as you go, or commit the suggested changes on this PR.",
            });

      - name: Verify fixer changes are committed
        if: steps.fixer_changes.outputs.changed == 'true'
        run: |
          if ! git diff --exit-code; then
            echo "Fixes are out of date."
            echo "Apply the reviewdog suggestions or run 'task engine:fix' from the repo root and commit the updated files."
            git --no-pager diff --stat
            exit 1
          fi

      - name: Run linting
        run: task engine:lint

      - name: Run type checking
        run: task engine:typecheck

      - name: Run tests
        run: task engine:test
