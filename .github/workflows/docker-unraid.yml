name: Build Docker and Update Unraid

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-unraid-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: prep
        shell: bash
        env:
          DOCKER_IMAGE_NAMESPACE: ${{ vars.DOCKER_IMAGE_NAMESPACE }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          IMAGE_NAMESPACE="$(printf '%s' "${DOCKER_IMAGE_NAMESPACE}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          IMAGE_NAME="$(printf '%s' "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')"
          IMAGE_NAME="${IMAGE_NAME//_/-}"

          if [[ -z "$IMAGE_NAMESPACE" ]] || ! printf '%s' "$IMAGE_NAMESPACE" | grep -Eq '^[a-z0-9]+([._-][a-z0-9]+)*$'; then
            echo "::error::Invalid Docker image namespace '$IMAGE_NAMESPACE'"
            exit 1
          fi

          if [[ -z "$IMAGE_NAME" ]] || ! printf '%s' "$IMAGE_NAME" | grep -Eq '^[a-z0-9]+([._-][a-z0-9]+)*$'; then
            echo "::error::Invalid Docker image name '$IMAGE_NAME'"
            exit 1
          fi

          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          IMAGE="$IMAGE_NAMESPACE/$IMAGE_NAME"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/embedded/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64/v8
          cache-from: type=gha,scope=unraid-docker
          cache-to: type=gha,mode=max,scope=unraid-docker
          tags: |
            ${{ steps.prep.outputs.image }}:latest
            ${{ steps.prep.outputs.image }}:${{ github.sha }}
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.short_sha }}

  update-unraid:
    name: Request Unraid update
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          check-latest: true

      - name: Trigger Unraid Docker update
        env:
          UNRAID_USERNAME: ${{ secrets.UNRAID_USERNAME }}
          UNRAID_PASSWORD: ${{ secrets.UNRAID_PASSWORD }}
        run: node tools/unraid/update-containers.mjs
