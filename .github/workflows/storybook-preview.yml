name: Storybook Preview

# When a PR changes Storybook (any *.stories.* file or the .storybook config),
# build the static Storybook, deploy it to the preview VPS on a PR-scoped port,
# and comment with the URL plus an expandable list of the stories that changed.
# Torn down when the PR closes. Mirrors PR-Auto-Deploy-V2's VPS deploy. Skipped
# for fork PRs, which don't receive the VPS secrets.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: storybook-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Detect whether this PR touches Storybook, and list exactly which story/config
  # files changed (used to build the comment). Skipped on close and for forks.
  changes:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      storybook: ${{ steps.filter.outputs.storybook }}
      files: ${{ steps.filter.outputs.storybook_files }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect Storybook changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          list-files: json
          filters: |
            storybook:
              - 'frontend/**/*.stories.@(ts|tsx|mdx)'
              - 'frontend/**/*.mdx'
              - 'frontend/.storybook/**'

  deploy:
    needs: changes
    if: needs.changes.outputs.storybook == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Build Storybook
        # `prepare` generates the icon set + OG metadata that stories import; the
        # storybook:build task only depends on `install`, so run prepare first
        # (a fresh checkout doesn't have the generated material-symbols-icons.json).
        run: |
          task frontend:prepare
          task frontend:storybook:build

      - name: Set up GitHub App Bot
        id: setup-bot
        uses: ./.github/actions/setup-bot
        continue-on-error: true
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.NEW_VPS_SSH_KEY }}" > ../private.key
          sudo chmod 600 ../private.key

      - name: Deploy Storybook to VPS
        id: deploy
        env:
          VPS_HOST: ${{ secrets.NEW_VPS_HOST }}
          VPS_USER: ${{ secrets.NEW_VPS_USERNAME }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}
          # Offset from the app preview (which uses the bare PR number) to avoid
          # a port collision on the shared VPS.
          SB_PORT=$((PR + 20000))
          DIR=/stirling/SB-PR-$PR

          tar czf storybook.tgz -C frontend/storybook-static .

          cat > docker-compose.yml << EOF
          version: '3.3'
          services:
            storybook:
              container_name: storybook-pr-$PR
              image: nginx:alpine
              ports:
                - "$SB_PORT:80"
              volumes:
                - $DIR/site:/usr/share/nginx/html:ro
              restart: on-failure:5
          EOF

          scp -i ../private.key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            storybook.tgz docker-compose.yml "$VPS_USER@$VPS_HOST:/tmp/"

          # Unquoted heredoc: $DIR expands here (a safe, PR-number-derived path);
          # the remote receives the literal path.
          ssh -i ../private.key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -T \
            "$VPS_USER@$VPS_HOST" << ENDSSH
            set -e
            rm -rf "$DIR/site" && mkdir -p "$DIR/site"
            tar xzf /tmp/storybook.tgz -C "$DIR/site"
            mv /tmp/docker-compose.yml "$DIR/docker-compose.yml"
            rm -f /tmp/storybook.tgz
            cd "$DIR"
            docker-compose down --remove-orphans 2>/dev/null || true
            docker-compose up -d
            docker image prune -af --filter "until=336h" --filter "label!=keep=true" || true
          ENDSSH

          echo "url=http://$VPS_HOST:$SB_PORT" >> "$GITHUB_OUTPUT"

      - name: Post Storybook preview comment
        if: success()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FILES_JSON: ${{ needs.changes.outputs.files }}
          SB_URL: ${{ steps.deploy.outputs.url }}
        with:
          github-token: ${{ steps.setup-bot.outputs.token || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const url = process.env.SB_URL;
            const files = JSON.parse(process.env.FILES_JSON || "[]");

            const isStory = (f) => /\.stories\.(ts|tsx|mdx)$/.test(f);
            const stories = files.filter(isStory);
            const config = files.filter((f) => f.startsWith("frontend/.storybook/"));
            const shorten = (f) =>
              f.replace(/^frontend\/editor\/src\//, "").replace(/^frontend\//, "");

            const storyList = stories.map((f) => `- \`${shorten(f)}\``).join("\n");
            const configList = config.map((f) => `- \`${shorten(f)}\``).join("\n");
            const summary =
              `${stories.length} stor${stories.length === 1 ? "y" : "ies"} changed` +
              (config.length ? ` (+${config.length} config file${config.length === 1 ? "" : "s"})` : "");

            const details =
              `<details>\n<summary>${summary}</summary>\n\n` +
              (storyList ? `**Stories**\n${storyList}\n\n` : "") +
              (configList ? `**Config**\n${configList}\n` : "") +
              `</details>`;

            const body =
              `## 📚 Storybook preview\n\n` +
              `🔗 **Preview:** [${url}](${url})\n\n` +
              `${details}\n\n` +
              `_Rebuilt on every push; torn down when the PR closes._`;

            // Replace any prior Storybook preview comment to avoid clutter.
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.body?.includes("## 📚 Storybook preview") && c.user?.type === "Bot") {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });

      - name: Cleanup local key
        if: always()
        run: rm -f ../private.key

  # Tear the preview down (container + files) and remove the comment when the PR
  # is closed or merged.
  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GitHub App Bot
        id: setup-bot
        uses: ./.github/actions/setup-bot
        continue-on-error: true
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.NEW_VPS_SSH_KEY }}" > ../private.key
          sudo chmod 600 ../private.key

      - name: Tear down Storybook preview
        env:
          VPS_HOST: ${{ secrets.NEW_VPS_HOST }}
          VPS_USER: ${{ secrets.NEW_VPS_USERNAME }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}
          DIR=/stirling/SB-PR-$PR
          ssh -i ../private.key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -T \
            "$VPS_USER@$VPS_HOST" << ENDSSH || true
            set -e
            if [ -d "$DIR" ]; then cd "$DIR" && docker-compose down --remove-orphans 2>/dev/null || true; fi
            rm -rf "$DIR"
          ENDSSH
          rm -f ../private.key

      - name: Remove Storybook preview comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.setup-bot.outputs.token || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.body?.includes("## 📚 Storybook preview") && c.user?.type === "Bot") {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }
