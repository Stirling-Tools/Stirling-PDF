name: Nightly E2E Tests

on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC every night
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright-all-browsers:
    name: Playwright (chromium + firefox + webkit)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
      - name: Install all Playwright browsers
        run: task frontend:test:e2e:install

      - name: Run E2E tests (all browsers)
        run: task frontend:test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-nightly-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 14

  label-gittensor-prs:
    name: Label PRs tracked by Gittensor
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Apply Gittensor label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const LABEL = "Gittensor";
            const repoFull = `${context.repo.owner}/${context.repo.repo}`;
            const repoKey = repoFull.toLowerCase();

            const res = await fetch("https://api.gittensor.io/prs", {
              headers: {
                accept: "application/json",
                "user-agent": "Mozilla/5.0 (gha-gittensor-labeler)",
              },
            });
            if (!res.ok) {
              throw new Error(`Gittensor API returned ${res.status} ${res.statusText}`);
            }
            const data = await res.json();

            const numbers = [...new Set(
              data
                .filter(p => p.repository && p.repository.toLowerCase() === repoKey)
                .map(p => p.pullRequestNumber)
                .filter(n => Number.isInteger(n) && n > 0)
            )];
            core.info(`Gittensor reports ${numbers.length} tracked PRs for ${repoFull}`);

            let added = 0, skipped = 0, failed = 0;
            for (const issue_number of numbers) {
              try {
                const existing = await github.rest.issues.listLabelsOnIssue({
                  ...context.repo,
                  issue_number,
                });
                if (existing.data.some(l => l.name === LABEL)) {
                  skipped++;
                  continue;
                }
                await github.rest.issues.addLabels({
                  ...context.repo,
                  issue_number,
                  labels: [LABEL],
                });
                core.info(`#${issue_number}: added "${LABEL}"`);
                added++;
              } catch (e) {
                core.warning(`#${issue_number}: ${e.message}`);
                failed++;
              }
            }
            core.notice(`Gittensor labeling: ${added} added, ${skipped} already labeled, ${failed} failed`);
