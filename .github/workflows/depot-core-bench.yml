name: Depot Core Scaling Benchmark

# Fans out the slow reusable workflows (docker-compose-tests, playwright e2e
# variants, test-build-docker) across a matrix of Depot runner sizes so we
# can see how each scales with cores. Each row in the Actions UI shows the
# job at one vCPU count; per-step durations give the direct comparison.
#
# Push to any branch starting with `bench/` to trigger, or use the
# "Run workflow" button on the workflow page.

on:
  push:
    branches:
      - 'bench/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write
  packages: read
  checks: write
  security-events: write

jobs:
  docker-compose-tests:
    strategy:
      fail-fast: false
      matrix:
        cores: ['4', '8', '16', '32']
    uses: ./.github/workflows/docker-compose-tests.yml
    secrets: inherit
    with:
      docker-base-changed: 'false'
      depot_cores: ${{ matrix.cores }}

  playwright-e2e:
    strategy:
      fail-fast: false
      matrix:
        cores: ['4', '8', '16', '32']
    uses: ./.github/workflows/e2e-stubbed.yml
    secrets: inherit
    with:
      depot_cores: ${{ matrix.cores }}

  playwright-e2e-live:
    strategy:
      fail-fast: false
      matrix:
        cores: ['4', '8', '16', '32']
    uses: ./.github/workflows/e2e-live.yml
    secrets: inherit
    with:
      depot_cores: ${{ matrix.cores }}

  playwright-e2e-enterprise:
    strategy:
      fail-fast: false
      matrix:
        cores: ['4', '8', '16', '32']
    uses: ./.github/workflows/build-enterprise.yml
    secrets: inherit
    with:
      depot_cores: ${{ matrix.cores }}

  test-build-docker:
    strategy:
      fail-fast: false
      matrix:
        cores: ['4', '8', '16', '32']
    uses: ./.github/workflows/test-build-docker.yml
    secrets: inherit
    with:
      docker-base-changed: 'false'
      depot_cores: ${{ matrix.cores }}
