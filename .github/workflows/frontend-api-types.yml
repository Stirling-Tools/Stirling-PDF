name: Frontend API Types CI

# Verifies the committed frontend tool API types
# (frontend/editor/src/core/generated/toolApiTypes.ts) are still in sync with
# the Java OpenAPI spec, mirroring the engine's tool_models check. Called from
# build.yml when the backend Java or the frontend changes; also runs on push to
# main as a post-merge safety net.
on:
  workflow_call:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-types:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: 9.6.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      # Rebuilds the OpenAPI spec from the current Java and regenerates the tool
      # API types in --check mode, failing if the committed file is out of date.
      - name: Verify frontend API types are up to date
        id: api-types-check
        continue-on-error: true
        run: task frontend:api-types:check

      - name: Comment on API types check failure
        # Only post a comment on PRs. github-script's PR helpers need an
        # issue/PR number, which doesn't exist on merge_group runs.
        if: steps.api-types-check.outcome == 'failure' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- api-types-check -->';
            const body = [
              marker,
              '### Frontend API Types Check Failed',
              '',
              'The generated `frontend/editor/src/core/generated/toolApiTypes.ts` is out of date with the Java OpenAPI spec and will need to be regenerated before it can be merged in.',
              '',
              'Run `task frontend:api-types` to regenerate, then commit the updated file.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if API types check failed
        if: steps.api-types-check.outcome == 'failure'
        run: |
          echo "============================================"
          echo "  Frontend API Types Check Failed"
          echo "============================================"
          echo ""
          echo "The generated frontend/editor/src/core/generated/toolApiTypes.ts"
          echo "is out of date with the Java OpenAPI spec and will"
          echo "need to be regenerated before it can be merged in."
          echo ""
          echo "Run 'task frontend:api-types' to regenerate, then"
          echo "commit the updated file."
          echo "============================================"
          exit 1

      - name: Remove API types check comment on success
        if: steps.api-types-check.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- api-types-check -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
