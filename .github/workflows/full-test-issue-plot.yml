name: Full Test Matrix With Issue + Plot

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/full-test-issue-plot.yml
  schedule:
    - cron: "0 2 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  full-test-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup GitHub App Bot
        id: setup-bot
        uses: ./.github/actions/setup-bot
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: 9.3.1

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: Prepare frontend generated assets and env files
        run: task frontend:prepare

      - name: Install E2E browser dependencies
        run: task e2e:install

      - name: Run full test suites and collect metrics
        id: run-tests
        shell: bash
        run: |
          set +e
          mkdir -p ci
          RESULTS_FILE="ci/test-results.tsv"
          echo -e "suite\tstatus\tduration_seconds" > "$RESULTS_FILE"

          run_suite() {
            local suite="$1"
            local command="$2"
            local start end duration status
            start=$(date +%s)
            bash -lc "$command"
            status=$?
            end=$(date +%s)
            duration=$((end - start))
            if [ "$status" -eq 0 ]; then
              echo -e "${suite}\tpass\t${duration}" >> "$RESULTS_FILE"
            else
              echo -e "${suite}\tfail\t${duration}" >> "$RESULTS_FILE"
            fi
            return "$status"
          }

          overall=0
          run_suite "gradle:test" "bash gradlew test --warning-mode all -PnoSpotless" || overall=1
          run_suite "backend:test" "task backend:test" || overall=1
          run_suite "frontend:test" "task frontend:test" || overall=1
          run_suite "engine:test" "task engine:test" || overall=1
          run_suite "e2e:check" "task e2e:check" || overall=1

          echo "overall_failed=$overall" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hygiene checks (deprecated/unused signals)
        id: hygiene
        shell: bash
        run: |
          set +e
          mkdir -p ci/hygiene
          overall=0

          bash gradlew compileJava compileTestJava --warning-mode all -PnoSpotless > ci/hygiene/gradle-compile.log 2>&1
          gradle_status=$?
          [ "$gradle_status" -eq 0 ] || overall=1

          task frontend:lint > ci/hygiene/frontend-lint.log 2>&1
          frontend_status=$?
          [ "$frontend_status" -eq 0 ] || overall=1

          task engine:lint > ci/hygiene/engine-lint.log 2>&1
          engine_status=$?
          [ "$engine_status" -eq 0 ] || overall=1

          echo "overall_hygiene_failed=$overall" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build hygiene summary (deprecated/unused)
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import re

          files = [
              ("gradle-compile.log", "Gradle Java compile"),
              ("frontend-lint.log", "Frontend ESLint"),
              ("engine-lint.log", "Engine Ruff"),
          ]
          root = pathlib.Path("ci/hygiene")
          out = []
          out.append("# Code Hygiene Report")
          out.append("")
          out.append("| Source | Deprecated hits | Unused hits | Warning hits |")
          out.append("|---|---:|---:|---:|")

          dep_re = re.compile(r"deprecat", re.IGNORECASE)
          unused_re = re.compile(r"unused|F401|F841|no-unused-vars", re.IGNORECASE)
          warn_re = re.compile(r"warning|warn", re.IGNORECASE)

          for filename, label in files:
              p = root / filename
              text = p.read_text(encoding="utf-8", errors="replace") if p.exists() else ""
              dep = len(dep_re.findall(text))
              un = len(unused_re.findall(text))
              wa = len(warn_re.findall(text))
              out.append(f"| {label} | {dep} | {un} | {wa} |")

          out.append("")
          out.append("Logs:")
          out.append("- `ci/hygiene/gradle-compile.log`")
          out.append("- `ci/hygiene/frontend-lint.log`")
          out.append("- `ci/hygiene/engine-lint.log`")
          (root / "hygiene-report.md").write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

      - name: Generate Markdown summary and SVG plot
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import pathlib

          path = pathlib.Path("ci/test-results.tsv")
          rows = list(csv.DictReader(path.open("r", encoding="utf-8"), delimiter="\t"))

          md = [
              "# CI Test Report",
              "",
              "| Suite | Status | Duration (s) |",
              "|---|---|---:|",
          ]
          for row in rows:
              icon = "✅" if row["status"] == "pass" else "❌"
              md.append(f"| `{row['suite']}` | {icon} {row['status']} | {row['duration_seconds']} |")
          pathlib.Path("ci/test-report.md").write_text("\n".join(md) + "\n", encoding="utf-8")

          width = 1000
          height = 420
          margin_left = 180
          margin_right = 40
          margin_top = 40
          margin_bottom = 70

          durations = [int(r["duration_seconds"]) for r in rows] if rows else [0]
          max_duration = max(durations) if max(durations) > 0 else 1
          chart_w = width - margin_left - margin_right
          chart_h = height - margin_top - margin_bottom
          bar_gap = 18
          bar_h = max(20, int((chart_h - bar_gap * (len(rows) - 1)) / max(1, len(rows))))

          parts = [
              f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">',
              '<rect width="100%" height="100%" fill="#ffffff"/>',
              '<text x="20" y="28" font-family="Arial, sans-serif" font-size="20" fill="#111">CI Test Duration Plot</text>',
              f'<line x1="{margin_left}" y1="{margin_top}" x2="{margin_left}" y2="{height - margin_bottom}" stroke="#777"/>',
              f'<line x1="{margin_left}" y1="{height - margin_bottom}" x2="{width - margin_right}" y2="{height - margin_bottom}" stroke="#777"/>',
          ]

          for i, row in enumerate(rows):
              y = margin_top + i * (bar_h + bar_gap)
              duration = int(row["duration_seconds"])
              bar_w = int((duration / max_duration) * chart_w)
              color = "#2e7d32" if row["status"] == "pass" else "#c62828"
              parts.append(f'<text x="10" y="{y + bar_h * 0.7:.0f}" font-family="Arial, sans-serif" font-size="14" fill="#222">{row["suite"]}</text>')
              parts.append(f'<rect x="{margin_left}" y="{y}" width="{bar_w}" height="{bar_h}" fill="{color}" rx="4"/>')
              parts.append(f'<text x="{margin_left + bar_w + 8}" y="{y + bar_h * 0.7:.0f}" font-family="Arial, sans-serif" font-size="13" fill="#111">{duration}s ({row["status"]})</text>')

          parts.append('</svg>')
          pathlib.Path("ci/test-plot.svg").write_text("\n".join(parts), encoding="utf-8")
          PY

      - name: Upload test metrics artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: full-test-report
          path: |
            ci/test-results.tsv
            ci/test-report.md
            ci/test-plot.svg
            ci/hygiene/hygiene-report.md
            ci/hygiene/gradle-compile.log
            ci/hygiene/frontend-lint.log
            ci/hygiene/engine-lint.log
          retention-days: 14

      - name: Publish run summary
        shell: bash
        run: |
          cat ci/test-report.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo 'Plot artifact: `ci/test-plot.svg`' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat ci/hygiene/hygiene-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Detect changes to this workflow file
        id: detect-self-change
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -e
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed="$(git diff --name-only "$base_sha" "$head_sha" -- .github/workflows/full-test-issue-plot.yml | wc -l)"
          if [ "$changed" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment report on PR when this workflow changed
        if: github.event_name == 'pull_request' && steps.detect-self-change.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.setup-bot.outputs.token }}
          script: |
            const fs = require('fs');
            const marker = '<!-- full-test-issue-plot-report -->';
            const testReport = fs.readFileSync('ci/test-report.md', 'utf8').trim();
            const hygieneReport = fs.readFileSync('ci/hygiene/hygiene-report.md', 'utf8').trim();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## Full Test Issue Plot Evaluation',
              '',
              `Workflow-Datei \`.github/workflows/full-test-issue-plot.yml\` wurde in dieser PR geändert.`,
              '',
              `Run: ${runUrl}`,
              '',
              '### Test-Auswertung',
              '',
              testReport,
              '',
              '### Hygiene-Auswertung',
              '',
              hygieneReport,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((c) => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Create or update failure issue
        if: steps.run-tests.outputs.overall_failed == '1' || steps.hygiene.outputs.overall_hygiene_failed == '1'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.setup-bot.outputs.token }}
          script: |
            const marker = '<!-- full-test-ci-issue -->';
            const title = '[CI] Full test suite failing';
            const body = [
              marker,
              'A full CI test run or hygiene check has failed.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Commit: ${context.sha}`,
              '',
              'Check the uploaded artifact `full-test-report` for the TSV, markdown report, and SVG plot.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((i) => i.title === title && (i.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'ci'],
              });
            }

      - name: Fail workflow if any suite failed
        if: steps.run-tests.outputs.overall_failed == '1' || steps.hygiene.outputs.overall_hygiene_failed == '1'
        run: |
          echo "At least one test suite or hygiene check failed. See full-test-report artifact for details."
          exit 1
