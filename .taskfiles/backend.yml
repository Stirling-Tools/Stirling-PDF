version: '3'

vars:
  GRADLE: '{{if eq OS "windows"}}gradlew.bat{{else}}./gradlew{{end}}'

tasks:
  run:
    desc: "Run Spring Boot backend on :8080"
    ignore_error: true
    cmds:
      - '{{.GRADLE}} :stirling-pdf:bootRun'

  build:
    desc: "Full backend build"
    cmds:
      - '{{.GRADLE}} clean build'

  build:fast:
    desc: "Build without tests"
    cmds:
      - '{{.GRADLE}} clean build -x test'

  build:ci:
    desc: "Build for CI (formatting checked separately)"
    cmds:
      - '{{.GRADLE}} build -PnoSpotless'

  test:
    desc: "Run JUnit tests"
    cmds:
      - '{{.GRADLE}} test'

  format:
    desc: "Apply Spotless formatting"
    cmds:
      - '{{.GRADLE}} spotlessApply'

  format:check:
    desc: "Check code formatting"
    cmds:
      - '{{.GRADLE}} spotlessCheck'

  coverage:
    desc: "Generate JaCoCo coverage report"
    cmds:
      - '{{.GRADLE}} jacocoTestReport'

  swagger:
    desc: "Generate OpenAPI docs"
    cmds:
      - '{{.GRADLE}} :stirling-pdf:generateOpenApiDocs'

  check:
    desc: "Full backend quality gate"
    cmds:
      - task: format:check
      - task: test
      - task: coverage

  version:
    desc: "Print project version"
    silent: true
    cmds:
      - '{{.GRADLE}} printVersion --quiet | tail -1'

  licenses:check:
    desc: "Check dependency licenses"
    cmds:
      - '{{.GRADLE}} checkLicense --no-parallel'

  licenses:generate:
    desc: "Check and generate dependency license report"
    cmds:
      - '{{.GRADLE}} checkLicense generateLicenseReport --no-parallel'

  clean:
    desc: "Gradle clean"
    cmds:
      - '{{.GRADLE}} clean'
