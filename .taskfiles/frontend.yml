version: '3'

tasks:
  install:
    desc: "Install frontend npm dependencies"
    run: once
    cmds:
      - '{{ if eq .CI "true" }}npm ci{{ else }}npm install{{ end }}'
    sources:
      - package-lock.json
      - package.json
    status:
      - test -d node_modules
    env:
      CI: '{{ .CI | default "false" }}'

  prep:env:
    desc: "Generate .env from example if missing"
    deps: [install]
    cmds:
      - npm run tsx -- scripts/setup-env.ts
    sources:
      - scripts/setup-env.ts
      - config/.env.example
    generates:
      - .env

  prep:env:saas:
    desc: "Generate .env and .env.saas from examples if missing"
    deps: [install]
    cmds:
      - npm run tsx -- scripts/setup-env.ts --saas
    sources:
      - scripts/setup-env.ts
      - config/.env.example
      - config/.env.saas.example
    generates:
      - .env
      - .env.saas

  prep:env:desktop:
    desc: "Generate .env and .env.desktop from examples if missing"
    deps: [install]
    cmds:
      - npm run tsx -- scripts/setup-env.ts --desktop
    sources:
      - scripts/setup-env.ts
      - config/.env.example
      - config/.env.desktop.example
    generates:
      - .env
      - .env.desktop

  prep:icons:
    desc: "Generate icon bundle from source references"
    deps: [install]
    cmds:
      - npm run generate-icons

  prep:
    desc: "Set up dev environment"
    deps: [prep:env, prep:icons]

  prep:saas:
    desc: "Prep for SaaS mode"
    deps: [prep:env:saas, prep:icons]

  prep:desktop:
    desc: "Prep for desktop mode"
    deps: [prep:env:desktop, prep:icons]

  # ============================================================
  # Development
  # ============================================================

  dev:
    desc: "Start Vite dev server (default mode)"
    deps: [prep]
    ignore_error: true
    cmds:
      - npm run vite

  dev:core:
    desc: "Start Vite dev server in core mode"
    deps: [prep]
    ignore_error: true
    cmds:
      - npm run vite -- --mode core

  dev:proprietary:
    desc: "Start Vite dev server in proprietary mode"
    deps: [prep]
    ignore_error: true
    cmds:
      - npm run vite -- --mode proprietary

  dev:saas:
    desc: "Start Vite dev server in SaaS mode"
    deps: [prep:saas]
    ignore_error: true
    cmds:
      - npm run vite -- --mode saas

  dev:desktop:
    desc: "Start Vite dev server in desktop mode"
    deps: [prep:desktop]
    ignore_error: true
    cmds:
      - npm run vite -- --mode desktop

  # ============================================================
  # Build
  # ============================================================

  build:
    desc: "Production build (default mode)"
    deps: [prep]
    cmds:
      - npm run vite -- build

  build:core:
    desc: "Build for core mode"
    deps: [prep]
    cmds:
      - npm run vite -- build --mode core

  build:proprietary:
    desc: "Build for proprietary mode"
    deps: [prep]
    cmds:
      - npm run vite -- build --mode proprietary

  build:saas:
    desc: "Build for SaaS mode"
    deps: [prep:saas]
    cmds:
      - npm run vite -- build --mode saas

  build:desktop:
    desc: "Build for desktop mode"
    deps: [prep:desktop]
    cmds:
      - npm run vite -- build --mode desktop

  # ============================================================
  # Lint & Typecheck
  # ============================================================

  lint:
    desc: "Run ESLint + cycle detection"
    deps: [install]
    cmds:
      - npm run eslint -- --max-warnings=0
      - npm run dpdm -- src --circular --no-warning --no-tree --exit-code circular:1

  typecheck:
    desc: "Run TypeScript type checking"
    deps: [install]
    cmds:
      - npm run tsc -- --noEmit --project src/proprietary/tsconfig.json

  typecheck:all:
    desc: "Typecheck all build variants"
    deps: [install]
    cmds:
      - npm run tsc -- --noEmit --project src/core/tsconfig.json
      - npm run tsc -- --noEmit --project src/proprietary/tsconfig.json
      - npm run tsc -- --noEmit --project src/saas/tsconfig.json
      - npm run tsc -- --noEmit --project src/desktop/tsconfig.json
      - npm run tsc -- --noEmit --project scripts/tsconfig.json

  # ============================================================
  # Quality Gate
  # ============================================================

  check:
    desc: "Run typecheck + lint + test"
    cmds:
      - task: typecheck
      - task: lint
      - task: test

  # ============================================================
  # Test
  # ============================================================

  test:
    desc: "Run Vitest (single run)"
    deps: [install]
    cmds:
      - npm run vitest -- run

  test:watch:
    desc: "Run Vitest in watch mode"
    deps: [install]
    cmds:
      - npm run vitest -- --watch

  test:coverage:
    desc: "Run Vitest with coverage"
    deps: [install]
    cmds:
      - npm run vitest -- --coverage

  test:e2e:
    desc: "Run Playwright E2E tests"
    deps: [prep]
    cmds:
      - npm run playwright -- test

  test:e2e:install:
    desc: "Install Playwright browsers"
    cmds:
      - npm run playwright -- install --with-deps

  # ============================================================
  # Code Generation
  # ============================================================

  licenses:generate:
    desc: "Generate frontend license report"
    deps: [install]
    cmds:
      - npm run generate-licenses
