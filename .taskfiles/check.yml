version: '3'

tasks:
  all:
    desc: "Verify all required dev tools are installed"
    cmds:
      - task: java
      - task: node
      - task: python
      - task: uv
    silent: true

  java:
    desc: "Check Java 21+ is available"
    preconditions:
      - sh: java -version
        msg: "Java 21+ is required. Install JDK 21 or later."

  node:
    desc: "Check Node.js 18+ is available"
    preconditions:
      - sh: node --version
        msg: "Node.js 18+ is required. Install from https://nodejs.org/"

  python:
    desc: "Check Python 3.13+ is available (or will be installed by uv)"
    preconditions:
      - sh: command -v python3 || command -v python
        msg: "Python is required. Install Python 3.13+ or let uv handle it."

  uv:
    desc: "Check uv package manager is available"
    preconditions:
      - sh: command -v uv
        msg: "uv is required for the engine. Install from https://docs.astral.sh/uv/"

  docker:
    desc: "Check Docker is available"
    preconditions:
      - sh: command -v docker
        msg: "Docker is required. Install from https://docs.docker.com/"

  rust:
    desc: "Check Rust/Cargo is available (for Tauri desktop builds)"
    preconditions:
      - sh: command -v cargo
        msg: "Rust is required for Tauri desktop builds. Install from https://rustup.rs/"

  jlink:
    desc: "Check jlink is available (JDK required, not just JRE)"
    preconditions:
      - sh: command -v jlink
        msg: "jlink is required. Install a full JDK (not just JRE)."
