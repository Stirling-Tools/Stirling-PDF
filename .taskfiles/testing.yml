version: '3'

tasks:
  docker:
    desc: "Run full Docker integration test suite (testing/test.sh)"
    ignore_error: true
    cmds:
      - bash testing/test.sh {{.CLI_ARGS}}

  oauth:
    desc: "Start Keycloak + Stirling OAuth test environment (set LICENSE_KEY=<KEY> for premium)"
    summary: |
      Start the OAuth keycloak compose stack.
      Set LICENSE_KEY=<KEY> to skip the interactive license prompt:
        task testing:oauth LICENSE_KEY=abc123
      Pass extra flags (e.g. --auto, --nobuild) via -- :
        task testing:oauth -- --auto
    ignore_error: true
    cmds:
      - bash testing/compose/start-oauth-test.sh {{if .LICENSE_KEY}}--license-key "{{.LICENSE_KEY}}"{{end}} {{.CLI_ARGS}}

  oauth:down:
    desc: "Stop the OAuth test environment and remove volumes"
    cmds:
      - docker compose -f testing/compose/docker-compose-keycloak-oauth.yml down -v

  saml:
    desc: "Start Keycloak + Stirling SAML test environment (set LICENSE_KEY=<KEY> for premium)"
    summary: |
      Start the SAML keycloak compose stack.
      Set LICENSE_KEY=<KEY> to skip the interactive license prompt:
        task testing:saml LICENSE_KEY=abc123
      Pass extra flags (e.g. --auto, --with-storage, --nobuild, --language sv-SE) via -- :
        task testing:saml -- --auto --with-storage
    ignore_error: true
    cmds:
      - bash testing/compose/start-saml-test.sh {{if .LICENSE_KEY}}--license-key "{{.LICENSE_KEY}}"{{end}} {{.CLI_ARGS}}

  saml:down:
    desc: "Stop the SAML test environment and remove volumes"
    cmds:
      - docker compose -f testing/compose/docker-compose-keycloak-saml.yml down -v
