version: '3'

output: prefixed

vars:
  GRADLE: '{{if eq OS "windows"}}gradlew.bat{{else}}./gradlew{{end}}'

includes:
  backend:
    taskfile: .taskfiles/backend.yml
    dir: .
  frontend:
    taskfile: .taskfiles/frontend.yml
    dir: frontend
  engine:
    taskfile: .taskfiles/engine.yml
    dir: engine
  docker:
    taskfile: .taskfiles/docker.yml
    dir: .
  desktop:
    taskfile: .taskfiles/desktop.yml
    dir: frontend

tasks:
  # ============================================================
  # Setup & Prerequisites
  # ============================================================

  setup:
    desc: "Install all dependencies (frontend + engine; Gradle self-resolves)"
    cmds:
      - task: frontend:install
      - task: engine:install

  # ============================================================
  # Development
  # ============================================================

  dev:all:
    desc: "Start backend + frontend + engine concurrently (Ctrl+C to stop)"
    deps:
      - backend:run
      - frontend:dev
      - engine:run-dev

  # ============================================================
  # Build
  # ============================================================

  build:
    desc: "Build all components"
    cmds:
      - task: backend:build
      - task: frontend:build

  # ============================================================
  # Test
  # ============================================================

  test:
    desc: "Run ALL tests (backend + frontend + engine)"
    cmds:
      - task: backend:test
      - task: frontend:test
      - task: engine:test

  # ============================================================
  # Lint & Format
  # ============================================================

  lint:
    desc: "Run ALL linters (backend + frontend + engine)"
    cmds:
      - task: backend:format:check
      - task: frontend:lint
      - task: engine:lint

  format:
    desc: "Auto-fix formatting across all components"
    cmds:
      - task: backend:format
      - task: engine:fix

  # ============================================================
  # Quality Gate
  # ============================================================

  check:
    desc: "Run all checks (lint + typecheck + test) across all components"
    cmds:
      - task: backend:check
      - task: frontend:check
      - task: engine:check

  # ============================================================
  # Clean
  # ============================================================

  clean:
    desc: "Clean all build artifacts"
    cmds:
      - task: backend:clean
      - task: engine:clean
