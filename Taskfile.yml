version: '3'

output: prefixed

vars:
  GRADLE: '{{if eq OS "windows"}}gradlew.bat{{else}}./gradlew{{end}}'

includes:
  backend:
    taskfile: .taskfiles/backend.yml
    dir: .
  frontend:
    taskfile: .taskfiles/frontend.yml
    dir: frontend
  engine:
    taskfile: .taskfiles/engine.yml
    dir: engine
  docker:
    taskfile: .taskfiles/docker.yml
    dir: .
  desktop:
    taskfile: .taskfiles/desktop.yml
    dir: frontend

tasks:
  # ============================================================
  # Setup & Prerequisites
  # ============================================================

  install:
    desc: "Install all project dependencies"
    cmds:
      - task: frontend:install
      - task: engine:install

  # ============================================================
  # Development
  # ============================================================

  dev:
    desc: "Start backend + frontend concurrently"
    deps:
      - backend:dev
      - frontend:dev

  dev:all:
    desc: "Start backend + frontend + engine concurrently"
    deps:
      - backend:dev
      - frontend:dev
      - engine:dev

  # ============================================================
  # Build
  # ============================================================

  build:
    desc: "Build all components"
    cmds:
      - task: backend:build
      - task: frontend:build

  # ============================================================
  # Test
  # ============================================================

  test:
    desc: "Run ALL tests (backend + frontend + engine)"
    cmds:
      - task: backend:test
      - task: frontend:test
      - task: engine:test

  # ============================================================
  # Lint & Format
  # ============================================================

  lint:
    desc: "Run all linters and format checks"
    cmds:
      - task: backend:format:check
      - task: frontend:lint
      - task: engine:lint
      - task: engine:format:check

  format:
    desc: "Auto-fix formatting across all components"
    cmds:
      - task: backend:format
      - task: engine:format

  # ============================================================
  # Quality Gate
  # ============================================================

  check:
    desc: "Quick quality gate for local development"
    cmds:
      - task: backend:check
      - task: frontend:check
      - task: engine:check

  check:all:
    desc: "Full CI quality gate"
    cmds:
      - task: backend:check
      - task: frontend:check:all
      - task: engine:check

  # ============================================================
  # Clean
  # ============================================================

  clean:
    desc: "Clean all build artifacts"
    cmds:
      - task: backend:clean
      - task: engine:clean
