// REMOVED: bootRun{enabled=false} - Spring Boot plugin task. :saas is a Quarkus library module.
spotless {
    java {
        target 'src/**/java/**/*.java'
        targetExclude 'src/main/java/org/apache/**'
        googleJavaFormat(googleJavaFormatVersion).aosp().reorderImports(false)
        suppressLintsFor { setStep('google-java-format') }

        importOrder("java", "javax", "org", "com", "net", "io", "jakarta", "lombok", "me", "stirling")
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
    yaml {
        target '**/*.yml', '**/*.yaml'
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
    format 'gradle', {
        target '**/gradle/*.gradle', '**/*.gradle'
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
}

dependencies {
    implementation project(':common')
    implementation project(':proprietary')

    // Spring -> Quarkus extension mapping (full native migration):
    api 'io.quarkus:quarkus-security'                 // spring-boot-starter-security
    api 'io.quarkus:quarkus-hibernate-orm-panache'    // spring-boot-starter-data-jpa
    api 'io.quarkus:quarkus-oidc'                      // spring-boot-starter-oauth2-resource-server (bearer)
    // spring-boot-starter-webmvc -> quarkus-rest (inherited api-scoped from :common).
    // REMOVED: spring-boot-starter-aspectj - no AspectJ in Quarkus; use quarkus-arc CDI interceptors.
    // TODO: Migration required - rewrite any @Aspect advice (e.g. CreditSuccessAdvice) as CDI interceptors.

    // flyway-core -> quarkus-flyway (runs migrations at startup; see quarkus.flyway.* config).
    api 'io.quarkus:quarkus-flyway'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql'

    testImplementation 'com.tngtech.archunit:archunit-junit5:1.4.2'
}
