bootRun {
    enabled = false
}

spotless {
    java {
        target 'src/**/java/**/*.java'
        targetExclude 'src/main/java/org/apache/**'
        googleJavaFormat(googleJavaFormatVersion).aosp().reorderImports(false)
        suppressLintsFor { setStep('google-java-format') }

        importOrder("java", "javax", "org", "com", "net", "io", "jakarta", "lombok", "me", "stirling")
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
    yaml {
        target '**/*.yml', '**/*.yaml'
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
    format 'gradle', {
        target '**/gradle/*.gradle', '**/*.gradle'
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
}

dependencies {
    implementation project(':common')
    implementation project(':proprietary')

    api 'org.springframework.boot:spring-boot-starter-security'
    api 'org.springframework.boot:spring-boot-starter-data-jpa'
    api 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    api 'org.springframework.boot:spring-boot-starter-webmvc'
    api 'org.springframework.boot:spring-boot-starter-aspectj'

    api 'org.flywaydb:flyway-core'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql'
    // PgJDBC is bundled at runtime via :proprietary. We need `org.postgresql.PGConnection` at
    // compile time for the LISTEN/NOTIFY runner (PricingPolicyService cache invalidation) —
    // `compileOnly` keeps the artifact out of our build output. Version unpinned so it rides
    // the Spring Boot BOM and stays aligned with the runtime artifact.
    compileOnly 'org.postgresql:postgresql'

    testImplementation 'com.tngtech.archunit:archunit-junit5:1.4.2'
}
