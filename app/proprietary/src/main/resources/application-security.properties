# Defaults for the `security` profile — active on both the self-hosted proprietary
# build and SaaS (which layers `saas` on top). Core (default profile) never loads this.

# Enable the policy + sources subsystem by default (controllers, engine, stores,
# triggers). This is what lets the classification policy run. Override with
# policies.enabled=false (settings.yml or POLICIES_ENABLED env) to turn it off.
policies.enabled=true
