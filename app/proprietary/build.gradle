repositories {
    maven { url = "https://build.shibboleth.net/maven/releases" }
    maven { url = "https://repository.jboss.org/" }
}

ext {
    jwtVersion = '0.13.0'
    awsSdkVersion = '2.44.12'
    testcontainersMinioVersion = '1.21.4'
}

// REMOVED: bootRun{enabled=false} - Spring Boot plugin task. :proprietary is a Quarkus library module.
spotless {
        java {
        target 'src/**/java/**/*.java'
        targetExclude 'src/main/java/org/apache/**'
        googleJavaFormat(googleJavaFormatVersion).aosp().reorderImports(false)
        // google-java-format 1.28.0 bundles Guava 32.x which crashes Spotless lint on JDK 24/25
        suppressLintsFor { setStep('google-java-format') }

        importOrder("java", "javax", "org", "com", "net", "io", "jakarta", "lombok", "me", "stirling")
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
    yaml {
        target '**/*.yml', '**/*.yaml'
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
    format 'gradle', {
        target '**/gradle/*.gradle', '**/*.gradle'
        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
}
dependencies {
    implementation project(':common')
    api 'com.google.guava:guava:33.6.0-jre'

    // ---- Spring -> Quarkus extension mapping (full native migration) ----
    // spring-jdbc -> Agroal datasource (transitive via hibernate-orm). JdbcTemplate usage, if any,
    //   must be rewritten to plain JDBC / Panache.
    // TODO: Migration required - replace any org.springframework.jdbc.core.JdbcTemplate usage.
    // spring-webmvc -> quarkus-rest (inherited api-scoped from :common).
    api 'io.quarkus:quarkus-security'
    // spring-boot-starter-data-jpa -> Hibernate ORM with Panache.
    api 'io.quarkus:quarkus-hibernate-orm-panache'
    // spring-boot-starter-oauth2-client AND -oauth2-resource-server -> quarkus-oidc handles both the
    //   authorization-code (login) flow and bearer-token resource-server validation.
    api 'io.quarkus:quarkus-oidc'
    // spring-boot-starter-mail -> quarkus-mailer (reactive mailer; blocking API available).
    api 'io.quarkus:quarkus-mailer'
    // spring-boot-starter-cache -> quarkus-cache (Caffeine-backed).
    api 'io.quarkus:quarkus-cache'
    api 'com.github.ben-manes.caffeine:caffeine'
    // spring-boot-starter-data-redis -> quarkus-redis-client (used by the optional Valkey backplane).
    // TODO: Migration required - rewrite RedisTemplate/Lettuce usage on the Quarkus Redis client API.
    implementation 'io.quarkus:quarkus-redis-client'

    // REMOVED: spring-session-core - Quarkus has no Spring Session. Server-side session state
    //   (SessionPersistentRegistry, SessionRegistry) must be rewritten on Quarkus' HTTP session
    //   (quarkus-undertow servlet session) or a custom store.
    // TODO: Migration required - port Spring Session usage (session registry / persistence).

    // REMOVED: spring-boot-starter-jetty - Quarkus uses its own Vert.x HTTP server.

    // ---- SAML2: no native Quarkus extension. Rehosted on OpenSAML 5 (already pinned via
    //      openSamlVersion) following the dnulnets/quarkus-saml example. spring-security-saml2-
    //      service-provider and spring-security-core are removed; the SAML wiring is reimplemented
    //      on a Jakarta servlet + OpenSAML 5 (quarkus-undertow provides the servlet runtime).
    // TODO: Migration required - reimplement Saml2Configuration / CustomSaml2* on OpenSAML 5. ----
    api "org.opensaml:opensaml-core-api:$openSamlVersion"
    api "org.opensaml:opensaml-core-impl:$openSamlVersion"
    api "org.opensaml:opensaml-saml-api:$openSamlVersion"
    api "org.opensaml:opensaml-saml-impl:$openSamlVersion"
    api "org.opensaml:opensaml-security-api:$openSamlVersion"
    api "org.opensaml:opensaml-security-impl:$openSamlVersion"
    api "org.opensaml:opensaml-xmlsec-api:$openSamlVersion"
    api "org.opensaml:opensaml-xmlsec-impl:$openSamlVersion"
    api "org.opensaml:opensaml-messaging-api:$openSamlVersion"
    api "org.opensaml:opensaml-messaging-impl:$openSamlVersion"

    api 'io.swagger.core.v3:swagger-core-jakarta:2.2.46'
    implementation 'com.bucket4j:bucket4j_jdk17-core:8.19.0'
    // Lettuce-backed Bucket4j ProxyManager used by ValkeyRateLimitStore for cluster-wide
    // token-bucket rate limiting (parity with in-process Bucket4j semantics; no fixed-window
    // boundary doubling).
    implementation 'com.bucket4j:bucket4j_jdk17-lettuce:8.19.0'

    // https://mvnrepository.com/artifact/com.bucket4j/bucket4j_jdk17
    implementation "org.bouncycastle:bcprov-jdk18on:$bouncycastleVersion"

    implementation 'com.google.code.gson:gson:2.13.2'

    // micrometer-registry-prometheus -> Quarkus Micrometer Prometheus extension.
    api 'io.quarkus:quarkus-micrometer-registry-prometheus'

    api "io.jsonwebtoken:jjwt-api:$jwtVersion"
    runtimeOnly "io.jsonwebtoken:jjwt-impl:$jwtVersion"
    runtimeOnly "io.jsonwebtoken:jjwt-jackson:$jwtVersion"

    // JDBC drivers via Quarkus extensions (wire into the Agroal datasource).
    // NOTE: H2 is pinned to 2.3.232 because the on-disk file format is incompatible with 2.4.x and
    //   upgrading would break existing user databases. quarkus-jdbc-h2's BOM-managed H2 version may
    //   differ, so the explicit pin is forced below to preserve file compatibility.
    // TODO: Migration required - verify the H2 version Quarkus resolves still reads 2.3.232 files.
    runtimeOnly 'io.quarkus:quarkus-jdbc-h2'
    runtimeOnly 'com.h2database:h2:2.3.232'
    runtimeOnly 'io.quarkus:quarkus-jdbc-postgresql'
    implementation('com.coveo:saml-client:5.0.0') {
        exclude group: 'org.opensaml', module: 'opensaml-core'
    }

    implementation "software.amazon.awssdk:s3:$awsSdkVersion"
    implementation "software.amazon.awssdk:url-connection-client:$awsSdkVersion"

    // Testcontainers: real MinIO/LocalStack (S3) and Valkey for integration tests in CI without
    // manually-started instances. Tests skip cleanly when Docker is unavailable.
    testImplementation "org.testcontainers:testcontainers:$testcontainersMinioVersion"
    testImplementation "org.testcontainers:minio:$testcontainersMinioVersion"
    testImplementation "org.testcontainers:localstack:$testcontainersMinioVersion"
    testImplementation "org.testcontainers:junit-jupiter:$testcontainersMinioVersion"
}

tasks.register('prepareKotlinBuildScriptModel') {}

tasks.register('type3SignatureTool', JavaExec) {
    group = 'type3'
    description = 'Dump Type3 font signatures and glyph coverage for the Type3 library'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'stirling.software.SPDF.service.pdfjson.type3.tool.Type3SignatureTool'
    standardInput = System.in
}
