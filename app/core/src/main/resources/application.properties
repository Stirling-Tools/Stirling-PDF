# ---- External config files -------------------------------------------------------------------
# TODO: Migration required - SPDFApplication injected external settings.yml / custom settings via
#   spring.config.additional-location. Quarkus uses a different config-source mechanism
#   (SmallRye Config / quarkus.config.locations). Port ConfigInitializer accordingly.

# ---- Redis / Valkey backplane ----------------------------------------------------------------
# spring.autoconfigure.exclude (Redis) -> not applicable; Quarkus only wires the Redis client when
#   quarkus.redis.* is configured, so no dead localhost:6379 factory is created by default.
# The Redis client is only used by the optional Valkey cluster backplane (cluster.enabled=true AND
# cluster.backplane=valkey). In the default single-node deployment no quarkus.redis.hosts is set, so
# the RedisDataSource bean is INACTIVE. The Redis readiness health check is a startup observer that
# eagerly resolves that inactive bean and aborts boot - disable it here; a Valkey deployment that
# configures quarkus.redis.hosts can re-enable it with quarkus.redis.health.enabled=true.
quarkus.redis.health.enabled=false
