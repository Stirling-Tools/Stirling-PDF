# =============================================================================
# Quarkus application configuration (migrated from Spring Boot application.properties)
# Mapping reference: spring -> quarkus keys. Where no direct Quarkus property exists, the
# original behaviour is noted as a TODO to be handled in code (exception mappers, customizers).
# =============================================================================

# ---- Multi-module bean discovery -------------------------------------------------------------
# Quarkus only scans dependencies for CDI beans / JAX-RS resources / JPA entities when they carry a
# Jandex index. These entries index the local library modules (replaces Spring's scanBasePackages).
quarkus.index-dependency.common.group-id=stirling.software
quarkus.index-dependency.common.artifact-id=common
quarkus.index-dependency.proprietary.group-id=stirling.software
quarkus.index-dependency.proprietary.artifact-id=proprietary
quarkus.index-dependency.saas.group-id=stirling.software
quarkus.index-dependency.saas.artifact-id=saas

# ---- CDI / bean validation -------------------------------------------------------------------
# Several request DTOs (e.g. PDFFile#isValid) use the standard Bean Validation idiom of an
# @AssertTrue on a private getter-style method for cross-field validation. Hibernate Validator
# evaluates these as property constraints; Quarkus Arc cannot weave method-validation interception
# into a private method and fails the build by default. The constraint still applies via property
# validation, so downgrade the interception check from error to warning.
quarkus.arc.fail-on-intercepted-private-method=false

# ---- Packaging (was bootJar in app/core/build.gradle) ----------------------------------------
quarkus.package.jar.type=uber-jar
quarkus.package.jar.manifest.attributes."Enable-Native-Access"=ALL-UNNAMED
quarkus.package.jar.manifest.attributes."Implementation-Title"=Stirling-PDF

# ---- HTTP server (was server.* / Jetty) ------------------------------------------------------
# server.servlet.context-path=${SYSTEM_ROOTURIPATH:/}
quarkus.http.root-path=${SYSTEM_ROOTURIPATH:/}
# server.http2.enabled=true (HTTP/2 is on by default in Quarkus)
quarkus.http.http2=true
# server.forward-headers-strategy=NATIVE -> honour X-Forwarded-* from the reverse proxy
quarkus.http.proxy.proxy-address-forwarding=true
# server.compression.enabled=true + mime types
quarkus.http.enable-compression=true
quarkus.http.compress-media-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript,image/svg+xml,application/x-font-ttf,font/opentype,application/vnd.ms-fontobject,font/woff,font/woff2,application/font-woff,application/font-woff2,application/wasm
# spring.servlet.multipart.max-* + Jetty form/header limits -> Quarkus body/header limits
quarkus.http.limits.max-body-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:2000M}
quarkus.http.limits.max-header-size=32K
# server.servlet.session.timeout:30m (servlet sessions provided by quarkus-undertow)
quarkus.http.so-reuse-port=false

# TODO: Migration required - no direct Quarkus equivalent for the following; handle in code:
#   - spring.threads.virtual.enabled=true  -> annotate blocking endpoints with @RunOnVirtualThread
#   - spring.mvc.async.request-timeout      -> per-endpoint timeout handling
#   - spring.security.filter.dispatcher-types=REQUEST,ERROR
#   - spring.web.resources.mime-mappings.webmanifest=application/manifest+json
#   - server.servlet.session.tracking-modes=cookie (configure on quarkus-undertow)

# ---- OIDC / OAuth2 login -----------------------------------------------------------------------
# The quarkus-oidc extension is on the classpath for OAuth2/OIDC login, but it FAILS STARTUP if
# enabled without quarkus.oidc.auth-server-url. Under Spring, OAuth2 login was activated only when
# the operator configured a provider; the default (and the login-disabled / ultra-lite deployment)
# ran with no OIDC at all. Mirror that: OIDC is off by default and an OAuth2 deployment re-enables
# it by setting quarkus.oidc.enabled=true plus quarkus.oidc.auth-server-url/client-id/... .
quarkus.oidc.enabled=false

# ---- Error handling (was spring.web.error.* / spring.mvc.problemdetails.enabled=false) --------
# TODO: Migration required - GlobalExceptionHandler is an @ControllerAdvice; rewrite as JAX-RS
#   ExceptionMapper(s) producing RFC 7807 ProblemDetail responses. The Spring error-page / whitelabel
#   settings below have no Quarkus property equivalent:
#   spring.web.error.path=/error, whitelabel.enabled=false, include-stacktrace/exception/message=always

# ---- Datasource (was spring.datasource.*) ----------------------------------------------------
# H2 pinned to 2.3.232 file format (see proprietary/build.gradle). Connection details kept inline
# (single bundled DB), not behind %prod. because Stirling ships its own embedded DB file.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./configs/stirling-pdf-DB-2.3.232;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=

# ---- Hibernate ORM (was spring.jpa.*) --------------------------------------------------------
# spring.jpa.hibernate.ddl-auto=update
quarkus.hibernate-orm.database.generation=update
# spring.jpa.show-sql=false
quarkus.hibernate-orm.log.sql=false
# Spring Boot's default physical naming converts camelCase -> snake_case. Preserve that so existing
# column names keep working (Quarkus/Hibernate 6 would otherwise keep camelCase verbatim).
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# spring.jpa.open-in-view=false -> not applicable (no Open Session In View in Quarkus)
# spring.jpa.defer-datasource-initialization=true -> use import.sql / Flyway instead
# Entities with JSON-mapped columns: Hibernate needs a FormatMapper. The app does not customize
# JSON (de)serialization for persistence (Quarkus' REST Jackson mapper is tuned for endpoints, not
# DB columns), so opt out of reusing it for JSON columns - this is the documented, forward-compatible
# default (becomes the Quarkus default in a future release) and avoids coupling DB serialization to
# REST config such as quarkus.jackson.write-dates-as-timestamps.
quarkus.hibernate-orm.mapping.format.global=ignore

# ---- OpenAPI / Swagger (was springdoc.*) -----------------------------------------------------
# springdoc served /v1/api-docs + /swagger-ui.html; SmallRye OpenAPI serves /q/openapi + /q/swagger-ui.
# Re-point the schema path to preserve the existing /v1/api-docs URL used by clients.
quarkus.smallrye-openapi.path=/v1/api-docs
quarkus.swagger-ui.path=/swagger-ui.html
quarkus.swagger-ui.always-include=true
# Export the schema at build time (during quarkusBuild) so the copySwaggerDoc Gradle task can
# publish it as SwaggerDoc.json - the build-time replacement for springdoc's generateOpenApiDocs.
quarkus.smallrye-openapi.store-schema-directory=build/openapi-schema
# MicroProfile OpenAPI filter: re-adds the Angle / EditTextOperation request schemas that SmallRye
# drops for multipart @RestForm params (springdoc emitted them; the AI-engine tool-model generator
# and its tests depend on them). See ToolModelSchemaCustomizer.
mp.openapi.filter=stirling.software.SPDF.config.ToolModelSchemaCustomizer

# ---- Jackson (was spring.jackson.*) ----------------------------------------------------------
# spring.jackson.deserialization.fail-on-null-for-primitives=false
# TODO: Migration required - no Quarkus property for FAIL_ON_NULL_FOR_PRIMITIVES; register a CDI
#   io.quarkus.jackson.ObjectMapperCustomizer that disables that DeserializationFeature.

# ---- Logging (was logging.level.*) -----------------------------------------------------------
quarkus.log.category."org.springframework".level=WARN
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.category."com.zaxxer.hikari".level=WARN
quarkus.log.category."stirling.software.SPDF.service.PdfJsonConversionService".level=INFO
quarkus.log.category."stirling.software.common.service.JobExecutorService".level=INFO
quarkus.log.category."stirling.software.common.service.TaskManager".level=INFO

