<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print PDF</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #525659;
    }

    embed {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get('pdf');
    const name = params.get('name') || 'document.pdf';

    document.title = name;

    if (!pdfUrl) {
      document.body.textContent = 'Missing PDF URL';
      throw new Error('Missing PDF URL');
    }

    const embed = document.createElement('embed');
    embed.type = 'application/pdf';
    embed.src = pdfUrl;
    document.body.appendChild(embed);

    let printed = false;
    const triggerPrint = () => {
      if (printed) {
        return;
      }
      printed = true;
      window.focus();
      window.print();
    };

    embed.addEventListener('load', () => {
      window.setTimeout(triggerPrint, 300);
    });

    window.addEventListener('load', () => {
      window.setTimeout(triggerPrint, 1200);
    });
  </script>
</body>
</html>
